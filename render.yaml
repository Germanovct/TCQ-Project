services:
  - type: web
    name: tcq-backend
    env: python
    buildCommand: "cd tcq-pos/backend && pip install -r requirements.txt"
    startCommand: "cd tcq-pos/backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        value: tcq-prod-secret-key-2024
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: USE_SQLITE
        value: "false"
